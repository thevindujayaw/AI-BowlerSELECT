<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bowler Option | Log In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --lime: #c8f135;
      --dark: #0e0e0e;
      --card: #161616;
      --muted: #2a2a2a;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--dark);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(200,241,53,0.12) 0%, transparent 65%);
      bottom: -150px;
      left: -150px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }

    .card {
      background: var(--card);
      border: 1px solid #282828;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 460px;
      position: relative;
      z-index: 1;
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      background: rgba(200,241,53,0.12);
      color: var(--lime);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 999px;
      border: 1px solid rgba(200,241,53,0.25);
      margin-bottom: 18px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      line-height: 1;
      letter-spacing: 0.02em;
      color: #fff;
      margin-bottom: 6px;
    }

    h1 span { color: var(--lime); }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 32px;
      font-weight: 300;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .field-group {
      margin-bottom: 20px;
      animation: fadeIn 0.5s ease both;
    }

    .field-group:nth-child(1) { animation-delay: 0.1s; }
    .field-group:nth-child(2) { animation-delay: 0.18s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateX(-10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      background: var(--muted);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 13px 16px;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--lime);
      box-shadow: 0 0 0 3px rgba(200,241,53,0.1);
    }

    input::placeholder { color: #444; }

    .forgot {
      display: block;
      text-align: right;
      font-size: 12px;
      color: #555;
      text-decoration: none;
      margin-top: 8px;
      transition: color 0.2s;
    }

    .forgot:hover { color: var(--lime); }

    .btn {
      width: 100%;
      background: var(--lime);
      color: var(--dark);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.08em;
      border: none;
      border-radius: 10px;
      padding: 15px;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255,255,255,0.25) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.4s;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(200,241,53,0.3);
    }

    .btn:hover::after { transform: translateX(100%); }
    .btn:active { transform: translateY(0); box-shadow: none; }

    .divider {
      border: none;
      border-top: 1px solid #222;
      margin: 24px 0 20px;
    }

    .signup-link {
      text-align: center;
      color: #555;
      font-size: 13px;
    }

    .signup-link a {
      color: var(--lime);
      text-decoration: none;
      font-weight: 500;
    }

    .signup-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Bowler Option</div>
    <h1>LOG IN TO<br><span>BOWLER OPTION</span></h1>
    <p class="subtitle">Good to see you again. Sign in to continue to Bowler Option.</p>

    <form onsubmit="handleSubmit(event)">

      <div class="field-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
      </div>

      <div class="field-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Your password" required />
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn">Log In →</button>
    </form>

    <hr class="divider" />
    <p class="signup-link">Don't have an account? <a href="sign-up.html">Sign up</a></p>
  </div>

  <script src="config.js"></script>
  <script>
  const API_BASE = window.API_BASE;

  async function handleSubmit(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const res = await fetch(`${API_BASE}/api/auth/login`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        alert(data.message || "Login failed");
        return;
      }

      // Save token
      localStorage.setItem("token", data.token);

      alert("Login successful!");

      // Redirect to homepage
      window.location.href = "homepage.html";

    } catch (err) {
      console.error(err);
      alert("Server error. Make sure backend is running.");
    }
  }
</script>

</body>
</html>

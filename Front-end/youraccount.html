<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BowlerOpton — Your Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --lime: #c8f135;
      --dark: #0e0e0e;
      --card: #161616;
      --muted: #2a2a2a;
      --border: #282828;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: var(--dark);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,241,53,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,241,53,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(200,241,53,0.08) 0%, transparent 65%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.6; }
    }

    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      background: rgba(14,14,14,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid #1e1e1e;
    }

    .nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.05em;
      color: #fff;
    }
    .nav-logo span { color: var(--lime); }

    .nav-links { display: flex; gap: 36px; list-style: none; }

    .nav-links a {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #666;
      text-decoration: none;
      transition: color 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      left: 0; bottom: -4px;
      width: 0%; height: 2px;
      background: var(--lime);
      border-radius: 999px;
      transition: width 0.25s;
    }

    .nav-links a:hover { color: #fff; }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: var(--lime); }
    .nav-links a.active::after { width: 100%; }

    .layout {
      min-height: 100vh;
      padding-top: 84px;
      position: relative;
      z-index: 1;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 28px 60px;
    }

    .page-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
    }
    .page-title span { color: var(--lime); }

    .subtitle {
      font-size: 13px;
      color: #444;
      font-weight: 300;
      margin-bottom: 22px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: .06em;
      margin-bottom: 12px;
      color: #fff;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
    }

    .kv {
      display:grid;
      grid-template-columns: 140px 1fr;
      gap: 8px 12px;
      font-size: 14px;
      color: #bbb;
      line-height: 1.6;
    }

    .kv b { color: #888; font-weight: 500; }

    .pill {
      display:inline-flex;
      align-items:center;
      padding:6px 10px;
      border:1px solid #2a2a2a;
      border-radius:999px;
      background:#121212;
      color:#bbb;
      font-size:12px;
      gap: 6px;
    }

    .pill strong {
      color: var(--lime);
      font-weight: 600;
    }

    .btn {
      border: 1px solid #2a2a2a;
      background: #121212;
      color: #bbb;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: rgba(200,241,53,0.35);
      color: var(--lime);
    }

    .history-item {
      display:flex;
      flex-direction:column;
      gap: 10px;
      padding: 14px 14px;
      border: 1px solid #242424;
      border-radius: 12px;
      background: rgba(18,18,18,0.65);
      margin-bottom: 14px;
    }

    .history-top {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 12px;
    }

    .history-date {
      font-size: 12px;
      color: #888;
    }

    .history-mode {
      font-size: 12px;
      color: #aaa;
    }

    .history-mode strong {
      color: var(--lime);
      font-weight: 600;
    }

    .mini-grid {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 10px;
    }

    .mini {
      border: 1px solid #252525;
      border-radius: 12px;
      background: #121212;
      padding: 10px 12px;
      font-size: 13px;
      color: #bbb;
    }

    .mini b {
      display:block;
      color:#777;
      font-size: 11px;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .empty {
      border: 1px dashed #222;
      border-radius: 14px;
      background: rgba(22,22,22,0.5);
      padding: 28px 18px;
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }

    .loading {
      opacity: .7;
      font-size: 14px;
      color: #888;
    }

    .err {
      color: #ff836e;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">Bowler<span>Opton</span></div>
    <ul class="nav-links">
      <li><a href="homepage.html">Home</a></li>
      <li><a href="predictionpage.html">Prediction</a></li>
      <li><a href="#" class="active">Your Account</a></li>
    </ul>
  </nav>

  <div class="layout">
    <div class="container">
      <div class="page-title">Your <span>Account</span></div>
      <div class="subtitle">Profile details and prediction history.</div>

      <div class="grid">
        <!-- Profile -->
        <div class="card">
          <div class="card-title">
            <span>👤 Profile</span>
            <button class="btn" onclick="logout()">Logout</button>
          </div>

          <div id="profile-loading" class="loading">Loading profile…</div>
          <div id="profile-error" class="err" style="display:none;"></div>

          <div id="profile" style="display:none;">
            <div class="kv">
              <b>Name</b> <span id="u-name">—</span>
              <b>Email</b> <span id="u-email">—</span>
              <b>Team Type</b> <span id="u-teamType">—</span>
              <b>Team Name</b> <span id="u-teamName">—</span>
            </div>
          </div>
        </div>

        <!-- History -->
        <div class="card">
          <div class="card-title">
            <span>🕘 Prediction History</span>
            <span class="pill"><span>Saved:</span> <strong id="pred-count">0</strong></span>
          </div>

          <div id="history-loading" class="loading">Loading history…</div>
          <div id="history-error" class="err" style="display:none;"></div>

          <div id="history" style="display:none;"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const API_BASE = window.API_BASE;

    function getToken() {
      return localStorage.getItem("token");
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function logout() {
      localStorage.removeItem("token");
      window.location.href = "login.html";
    }

    async function deletePrediction(id) {
      const token = getToken();
      if (!token) {
        window.location.href = "login.html";
        return;
      }

      const ok = window.confirm("Delete this saved prediction?");
      if (!ok) return;

      try {
        const res = await fetch(`${API_BASE}/api/account/predictions/${id}`, {
          method: "DELETE",
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await res.json();
        if (!res.ok) {
          alert(data.error || data.message || "Failed to delete prediction");
          return;
        }

        loadAccount();
      } catch (err) {
        console.error(err);
        alert("Network/server error deleting prediction.");
      }
    }

    function fmtDate(iso) {
      try {
        return new Date(iso).toLocaleString();
      } catch (e) {
        return iso || "—";
      }
    }

    function renderHistory(predictions) {
      const box = document.getElementById("history");
      const countEl = document.getElementById("pred-count");
      countEl.textContent = String(predictions.length);

      if (!predictions.length) {
        box.innerHTML = `
          <div class="empty">
            No predictions saved yet. Go to <b style="color:var(--lime);font-weight:600;">Prediction</b> and run a prediction.
          </div>
        `;
        return;
      }

      box.innerHTML = predictions.map((p, idx) => {
        const input = p.input_data || {};
        const mode = input.mode || p.mode || "—";
        const predictionLabel = `Prediction ${idx + 1}`;

        const inputLines = [];
        if (mode === "international") {
          inputLines.push(`Match: ${escapeHtml(input.match_type || "—")}`);
          inputLines.push(`Pitch: ${escapeHtml(input.pitch_type || "—")}`);
          inputLines.push(`Ground: ${escapeHtml(input.ground || "—")}`);
          inputLines.push(`Start: ${escapeHtml(input.start_time || "—")}`);
          inputLines.push(`Team: ${escapeHtml(input.your_team || "—")}`);
          inputLines.push(`Opp: ${escapeHtml(input.opposition_team || "—")}`);
        } else {
          inputLines.push(`Match: ${escapeHtml(input.match_type || "—")}`);
          inputLines.push(`Pitch: ${escapeHtml(input.pitch_type || "—")}`);
          inputLines.push(`Location: ${escapeHtml(input.location || input.city || "—")}`);
          inputLines.push(`Start: ${escapeHtml(input.start_time || "—")}`);
        }

        const results = Array.isArray(p.results) ? p.results : [];
        const top4 = results.slice(0, 4).map((r, idx) => {
          const name = r.bowler_name || r.bowler_type || "—";
          const type = r.bowler_type && r.bowler_name ? r.bowler_type : "";
          const score = (r.score ?? "—");
          const summary = r.summary ? `<div style="margin-top:8px;color:#999;line-height:1.5;">${escapeHtml(r.summary)}</div>` : "";
          return `
            <div class="mini">
              <b>#${idx + 1}</b>
              <div style="color:#fff;font-weight:600;">${escapeHtml(name)}</div>
              ${type ? `<div style="color:#777;margin-top:4px;">${escapeHtml(type)}</div>` : ""}
              <div style="margin-top:6px;color:var(--lime);font-weight:600;">Score: ${escapeHtml(score)}</div>
              ${summary}
            </div>
          `;
        }).join("");

        return `
          <div class="history-item">
            <div class="history-top">
              <div>
                <div style="color:#fff;font-weight:600;font-size:14px;margin-bottom:4px;">${escapeHtml(predictionLabel)}</div>
                <div class="history-date">${escapeHtml(fmtDate(p.createdAt))}</div>
                <div class="history-mode">Mode: <strong>${escapeHtml(mode)}</strong></div>
              </div>
              <div style="display:flex;align-items:center;gap:10px;">
                <div class="pill"><span>Results:</span> <strong>${escapeHtml(results.length)}</strong></div>
                <button class="btn" onclick="deletePrediction('${escapeHtml(p._id || "")}')">Delete</button>
              </div>
            </div>

            <div style="color:#aaa;font-size:13px;line-height:1.6;">
              ${inputLines.join(" · ")}
            </div>

            ${top4 ? `<div class="mini-grid">${top4}</div>` : ""}
          </div>
        `;
      }).join("");
    }

    async function loadAccount() {
      const token = getToken();
      if (!token) {
        window.location.href = "login.html";
        return;
      }

      // UI reset
      document.getElementById("profile-loading").style.display = "block";
      document.getElementById("history-loading").style.display = "block";
      document.getElementById("profile-error").style.display = "none";
      document.getElementById("history-error").style.display = "none";
      document.getElementById("profile").style.display = "none";
      document.getElementById("history").style.display = "none";

      try {
        const res = await fetch(`${API_BASE}/api/account`, {
          method: "GET",
          headers: { "Authorization": `Bearer ${token}` }
        });

        const data = await res.json();

        if (!res.ok) {
          const msg = data.error || data.message || "Failed to load account";
          document.getElementById("profile-error").style.display = "block";
          document.getElementById("profile-error").textContent = msg;
          document.getElementById("history-error").style.display = "block";
          document.getElementById("history-error").textContent = msg;
          return;
        }

        // Profile
        const u = data.user || {};
        document.getElementById("u-name").textContent = u.name || "—";
        document.getElementById("u-email").textContent = u.email || "—";
        document.getElementById("u-teamType").textContent = u.teamType || "—";
        document.getElementById("u-teamName").textContent = u.teamName || "—";

        document.getElementById("profile-loading").style.display = "none";
        document.getElementById("profile").style.display = "block";

        // History
        const predictions = Array.isArray(data.predictions) ? data.predictions : [];
        renderHistory(predictions);

        document.getElementById("history-loading").style.display = "none";
        document.getElementById("history").style.display = "block";

      } catch (err) {
        console.error(err);
        document.getElementById("profile-loading").style.display = "none";
        document.getElementById("history-loading").style.display = "none";

        document.getElementById("profile-error").style.display = "block";
        document.getElementById("profile-error").textContent = "Network/server error loading account.";

        document.getElementById("history-error").style.display = "block";
        document.getElementById("history-error").textContent = "Network/server error loading history.";
      }
    }

    loadAccount();
  </script>
</body>
</html>
